<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07070f"/>
      <stop offset="100%" style="stop-color:#0f0e00"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="accentText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Glow blobs -->
  <circle cx="250" cy="180" r="320" fill="#f59e0b" opacity="0.12" filter="url(#blur1)"/>
  <circle cx="1080" cy="520" r="260" fill="#fb923c" opacity="0.10" filter="url(#blur2)"/>
  <circle cx="640" cy="720" r="300" fill="#f59e0b" opacity="0.06" filter="url(#blur1)"/>

  <!-- Badge -->
  <rect x="80" y="162" width="180" height="36" rx="18" fill="#f59e0b" opacity="0.15"/>
  <rect x="80" y="162" width="180" height="36" rx="18" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <text x="170" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="700" letter-spacing="1">∞ UNLIMITED</text>

  <!-- Product name -->
  <text x="80" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="72" fill="white" font-weight="800" letter-spacing="-2">Prismiq</text>

  <!-- Unlimited in gradient -->
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" letter-spacing="-1" fill="url(#accentText)">Unlimited</text>

  <!-- Tagline -->
  <text x="80" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.4">For power users &amp; teams</text>

  <!-- Accent line -->
  <rect x="80" y="440" width="240" height="3" rx="2" fill="url(#accent)"/>

  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="white" opacity="0.6">
    <text x="80" y="495">✓  Everything in Pro</text>
    <text x="80" y="525">✓  No scan limits, ever</text>
    <text x="80" y="555">✓  Bulk content processing</text>
    <text x="80" y="585">✓  Priority support</text>
  </g>

  <!-- Card -->
  <rect x="815" y="150" width="390" height="420" rx="24" fill="url(#cardBg)"/>
  <rect x="815" y="150" width="390" height="420" rx="24" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>

  <!-- Infinity symbol -->
  <text x="1010" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="50" fill="url(#accentText)" text-anchor="middle" opacity="0.4">∞</text>

  <!-- Price -->
  <text x="1010" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="78" fill="white" font-weight="800" text-anchor="middle">$15.99</text>
  <text x="1010" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" opacity="0.35" text-anchor="middle">per month</text>

  <!-- Divider -->
  <rect x="855" y="382" width="310" height="1" fill="#f59e0b" opacity="0.15"/>

  <!-- Scan badge -->
  <rect x="890" y="400" width="240" height="50" rx="12" fill="#f59e0b" opacity="0.12"/>
  <rect x="890" y="400" width="240" height="50" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>
  <text x="1010" y="431" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" font-weight="700">Unlimited scans / day</text>

  <!-- CTA -->
  <rect x="855" y="480" width="310" height="60" rx="14" fill="url(#accent)"/>
  <text x="1010" y="517" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">Subscribe →</text>

  <!-- Note -->
  <text x="1010" y="567" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" opacity="0.22" text-anchor="middle">Cancel anytime · No limits ever</text>

  <!-- Bottom -->
  <text x="80" y="660" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" opacity="0.2">prismiqai.vercel.app · Powered by Claude AI</text>
  <text x="1200" y="660" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" opacity="0.2" text-anchor="end">by Ctrl Labs</text>
</svg>
